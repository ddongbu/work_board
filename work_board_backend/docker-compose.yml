services:
  web:
    build: .
    container_name: work_board_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - work_board_net
    restart: unless-stopped

networks:
  work_board_net:
    external: true
